<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <rect x="20" y="20" width="160" height="160" rx="16" fill="#dc2626"/>
  <!-- Fist (simplified geometric) -->
  <rect x="82" y="50" width="36" height="44" rx="6" fill="white"/>
  <rect x="78" y="56" width="10" height="30" rx="3" fill="white"/>
  <rect x="112" y="56" width="10" height="30" rx="3" fill="white"/>
  <!-- Wrist -->
  <rect x="86" y="90" width="28" height="18" rx="2" fill="white"/>
  <!-- Rose stem -->
  <line x1="100" y1="50" x2="100" y2="28" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <line x1="100" y1="38" x2="112" y2="32" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <!-- Rose petals (simple circles) -->
  <circle cx="100" cy="26" r="7" fill="white"/>
  <circle cx="108" cy="30" r="5" fill="white"/>
  <circle cx="93" cy="29" r="5" fill="white"/>
  <!-- Text -->
  <text x="100" y="148" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="36" font-weight="bold" fill="white">PSOE</text>
</svg>
