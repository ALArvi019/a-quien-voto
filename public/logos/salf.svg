<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Angled dynamic shape -->
  <polygon points="20,40 180,20 180,160 20,180" fill="#1a1a1a" rx="8"/>
  <rect x="20" y="20" width="160" height="160" rx="16" fill="#1a1a1a"/>
  <!-- Orange accent bar -->
  <rect x="30" y="130" width="140" height="8" rx="4" fill="#f97316"/>
  <!-- Text -->
  <text x="100" y="110" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="64" font-weight="900" fill="#f97316">SALF</text>
  <!-- Small top accent -->
  <rect x="30" y="62" width="140" height="4" rx="2" fill="#f97316" opacity="0.5"/>
</svg>
